name: Windows wheel (Linux cross-build)

# Proof-of-concept: build the Windows wheel on a cheap Ubuntu runner by
# cross-compiling with clang-cl + xwin, then run the test suite on a Windows
# runner against the pre-built wheel.  This runs alongside the native Windows
# build in build-and-test.yml; it does not replace it yet.
#
# Currently limited to CPython 3.12 (limited-API / abi3), which the produced
# wheel also covers 3.13+.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/cross/**'
      - '.github/workflows/windows-cross.yml'

jobs:
  build-on-linux:
    name: Cross-build Windows wheel on Ubuntu (cp312 abi3)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install LLVM/clang-cl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18 cmake ninja-build
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nanobind==2.12.0 wheel setuptools

      - name: Install xwin
        run: |
          curl -fSL --retry 4 \
            https://github.com/Jake-Shadle/xwin/releases/download/0.6.6/xwin-0.6.6-x86_64-unknown-linux-musl.tar.gz \
            -o /tmp/xwin.tar.gz
          mkdir -p /tmp/xwin-bin
          tar -C /tmp/xwin-bin --strip-components=1 -xf /tmp/xwin.tar.gz
          echo "/tmp/xwin-bin" >> "$GITHUB_PATH"

      - name: Cross-build wheel
        env:
          PYVER: '3.12'
          ABI3: '1'
        run: |
          clang-cl --version
          lld-link --version || true
          bash scripts/cross/build_windows_wheel.sh

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cross-wheel-cp312
          path: ./wheelhouse/*.whl

  test-on-windows:
    name: Test cross-built wheel on Windows (py ${{ matrix.py_ver }})
    needs: build-on-linux
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        py_ver: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.py_ver }}

      - uses: actions/download-artifact@v8
        with:
          name: windows-cross-wheel-cp312
          path: wheelhouse

      - name: Install cross-built wheel + test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.10.0 torchvision==0.25.0 --index-url https://download.pytorch.org/whl/cpu/
          python -m pip install pytest flake8 onnxruntime onnxscript==0.6.2 timm==1.0.26
          python -m pip install --no-index --find-links wheelhouse onnxsim

      - name: Verify the wheel is really the cross-built one
        shell: bash
        run: |
          python -c "import onnxsim, onnxsim.onnxsim_cpp2py_export as m; print('onnxsim', onnxsim.__version__); print(m.__file__)"

      - name: Run tests
        shell: bash
        run: |
          pytest -v tests
          onnxsim -h
          onnxsim --list-default-optimizers
