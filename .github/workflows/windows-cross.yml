name: Windows wheel (Linux cross-build)

# Proof-of-concept: build a Windows abi3 wheel on a cheap Ubuntu runner by
# cross-compiling with llvm-mingw (clang + lld + a self-contained UCRT sysroot),
# then run the test suite on a Windows runner against that one wheel for multiple
# CPython versions. Runs alongside the native Windows build in build-and-test.yml.
#
# A single cp312-abi3 wheel covers CPython 3.12+: nanobind builds a limited-API
# module and the target python3.lib (from the official CPython NuGet package)
# imports the stable-ABI python3.dll, so the wheel loads on 3.12, 3.13, ...

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/cross/**'
      - '.github/workflows/windows-cross.yml'

jobs:
  build-on-linux:
    name: Cross-build Windows abi3 wheel on Ubuntu (cp312, llvm-mingw)
    runs-on: ubuntu-24.04
    env:
      # Cache C++ compilation across runs (host protoc, target abseil/protobuf,
      # onnx/onnxsim), matching build-and-test.yml.
      SCCACHE_GHA_ENABLED: 'on'
      ACTIONS_CACHE_SERVICE_V2: 'on'
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build xz-utils unzip build-essential
          # build-essential provides the host gcc/g++ used for the host protoc build

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'   # abi3 floor

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nanobind==2.12.0 wheel setuptools

      - name: Cross-build abi3 wheel (llvm-mingw)
        env:
          BACKEND: llvm-mingw
          PYVER: '3.12'
          ABI3: '1'
        run: bash scripts/cross/build_windows_wheel.sh

      - uses: actions/upload-artifact@v7
        with:
          name: windows-cross-abi3-wheel
          path: ./wheelhouse/*.whl

  test-on-windows:
    name: Test abi3 wheel on Windows (py ${{ matrix.py_ver }})
    needs: build-on-linux
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        py_ver: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.py_ver }}

      - uses: actions/download-artifact@v8
        with:
          name: windows-cross-abi3-wheel
          path: wheelhouse

      - name: Install cross-built wheel + test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.10.0 torchvision==0.25.0 --index-url https://download.pytorch.org/whl/cpu/
          python -m pip install pytest flake8 onnxruntime onnxscript==0.6.2 timm==1.0.26
          # Install the single cross-built abi3 wheel by path (forces our wheel,
          # not PyPI's); its deps (onnx, rich) resolve from PyPI. The same wheel
          # is installed on every Python version in the matrix.
          whl=$(ls wheelhouse/onnxsim-*.whl)
          echo "installing ${whl}"
          python -m pip install "${whl}"

      # Run from a neutral directory: the repo root contains an ./onnxsim source
      # package (without the compiled .pyd) that would otherwise shadow the
      # pip-installed wheel. cibuildwheel does the same by running tests from an
      # isolated dir with an absolute {project}/tests path.
      - name: Verify the wheel is really the cross-built one
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import onnxsim, onnxsim.onnxsim_cpp2py_export as m; print('onnxsim', onnxsim.__version__); print(m.__file__)"

      - name: Run tests
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          pytest -v "${GITHUB_WORKSPACE}/tests"
          onnxsim -h
          onnxsim --list-default-optimizers
